# Copy to config/config.yaml and edit. config.yaml is gitignored.
# Canonical spec: docs/analysis_plan.md (the SAP). This example reflects the CLEAN-ROOM design:
# every feature is re-computed from raw EEG (zero reuse of prior derived tables).

data:
  s3:
    bucket: bdsp-opendata-repository
    eeg_bids: EEG/bids            # s3:.../EEG/bids/{site}/sub-{bdsp_id}/ses-{N}/eeg/..._eeg.edf
  local:
    raw:     ./data/raw
    derived: ./data/derived
    manifest: ./data/manifest     # frozen run/report manifests (report_manifest_v3.parquet)

# OMOP (age/sex at EEG). Credentials come from env, NOT this file. See docs/omop-query-instructions.txt
omop:
  host: localhost                 # via SSH tunnel to the Aurora endpoint
  port: 5433
  dbname: bdsp_omop
  # user/password: set OMOP_USER / OMOP_PASSWORD in the environment
  eeg_concept_id: 4181917

# Feature extraction (src/morgoth_slowing/features/extract.py is authoritative).
extract:
  segment_seconds: 15             # 3000 samp @ 200 Hz
  step_seconds: 14                # 1 s overlap
  max_analyze_hours: 24           # MAX_ANALYZE_HOURS — analyze up to the first 24 h (never "first 600 s")
  fs: 200
  bands:                          # theta is 4-8 (contiguous with alpha; NOT 4-7)
    delta: [1.0, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta:  [13.0, 30.0]
    gamma: [30.0, 45.0]
    total: [0.5, 45.0]

# Sleep stages (Morgoth ss_hm_1 stager). Norms are stage-conditioned.
stages: [W, N1, N2, N3, REM]      # "Other" excluded from norms

# Normative model (R GAMLSS/LMS; scripts/gamlss_fit.R). SEX-POOLED (ΔAUROC ≤ 0.002).
normative_model:
  method: gamlss                  # BCT (Box-Cox-t) / LMS
  age_continuous: true
  sex: pooled                     # NOT sex-specific
  conditioned_on: [age, stage, region]
  percentiles: [3, 10, 25, 50, 75, 90, 97]
  cross_fit: true                 # out-of-fold z for normals (no self-normalization)

# Recording identity + inclusion.
run:
  recording_key: eeg_id           # {patient_id}_{eeg_datetime} — one row per EEG (not per patient)
  min_usable_fraction: 0.20       # exclude recordings below this usable-segment fraction

# NOTE: FORBIDDEN output (docs/claims_table.md) — do NOT configure these:
#   severity adjectives (mild/moderate/marked), ACNS frequency words (rare/frequent/continuous),
#   band-from-our-features. Prevalence is reported as a % (ALLOWED), never as a word.
