# Copy to config/config.yaml and edit. config.yaml is gitignored.

data:
  s3:
    bucket: bdsp-opendata-credentialed
    growth_curves: morgoth2/data/internal_dataset/Growth_curves/
    focal_examples: morgoth1/data/internal_dataset/FOCALSLOWING/
    gen_examples:   morgoth1/data/internal_dataset/GENSLOWING/
  local:
    raw:     ./data/raw
    derived: ./data/derived

# OMOP (age/sex at EEG). Credentials come from env, NOT this file. See docs/omop-query-instructions.txt
omop:
  host: localhost      # via SSH tunnel to the Aurora endpoint
  port: 5433
  dbname: bdsp_omop
  # user/password: set OMOP_USER / OMOP_PASSWORD in the environment
  eeg_concept_id: 4181917
  psg_concept_id: 4189015

# Growth_curves features are PRECOMPUTED (18x31 per 15-s segment; see docs/data_dictionary.md).
# We consume them directly; spectral params are only needed if we ever re-featurize raw EEG.
spectral:
  segment_seconds: 15
  # fs / multitaper params: only relevant for re-featurizing raw (FOCAL/GENSLOWING segments_raw).

# Bands present in the feature set (JJ's definitions). Features are linear power -> log before z.
bands: [delta, theta, alpha, beta, gamma]
# Slowing ratios of interest already provided per channel:
#   alpha/delta (inverse DAR), alpha/theta (inverse TAR), delta/total, theta/total, delta/theta.

# Sleep stages as coded in res column 1. Norms are computed per-state.
# NOTE: wake is a single stage here (eyes-open/closed/drowsy are NOT separated) -> limitation.
states:
  "0": W
  "1": N1
  "2": N2
  "3": N3
  "4": REM
  # "5": Other  -> excluded from norms

scoring:
  z_threshold: 2.0       # tau; calibrate against held-out normals
  # ACNS-style prevalence words (fraction of usable state time)
  prevalence_words:
    rare:        [0.00, 0.01]
    occasional:  [0.01, 0.10]
    frequent:    [0.10, 0.50]
    abundant:    [0.50, 0.90]
    continuous:  [0.90, 1.01]
  # provisional patient-level-z severity words
  severity_words:
    mild:     [2.0, 3.0]
    moderate: [3.0, 4.5]
    marked:   [4.5, 999]

normative_model:
  method: gamlss         # gamlss | quantile_regression | robust_zscore
  age_continuous: true
  percentiles: [3, 10, 25, 50, 75, 90, 97]
  validation: loso       # leave-one-subject-out

control_group:
  age_bands: [[0,2],[3,5],[6,12],[13,17],[18,29],[30,44],[45,59],[60,74],[75,120]]
  sexes: [F, M]
  min_usable_segments_per_state: 20   # denominator guard
