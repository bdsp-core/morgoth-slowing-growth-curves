# Bipolar (double-banana) montage. NOTE: the montage + regions are hardcoded in
# src/morgoth_slowing/features/recording.py (the authoritative source; this YAML is not read by the fleet
# path — kept as documentation, aligned to recording.py). 18 channels in the fixed order below.

channel_order:
  - Fp1-F7   # 0
  - F7-T3    # 1
  - T3-T5    # 2
  - T5-O1    # 3
  - Fp2-F8   # 4
  - F8-T4    # 5
  - T4-T6    # 6
  - T6-O2    # 7
  - Fp1-F3   # 8
  - F3-C3    # 9
  - C3-P3    # 10
  - P3-O1    # 11
  - Fp2-F4   # 12
  - F4-C4    # 13
  - C4-P4    # 14
  - P4-O2    # 15
  - Fz-Cz    # 16
  - Cz-Pz    # 17

# Clinical regions as groups of bipolar channels.
regions:
  L_temporal:    [Fp1-F7, F7-T3, T3-T5, T5-O1]     # left temporal chain
  R_temporal:    [Fp2-F8, F8-T4, T4-T6, T6-O2]     # right temporal chain
  L_parasagittal: [Fp1-F3, F3-C3, C3-P3, P3-O1]    # left parasagittal chain
  R_parasagittal: [Fp2-F4, F4-C4, C4-P4, P4-O2]    # right parasagittal chain
  midline:       [Fz-Cz, Cz-Pz]
  whole_head:    [Fp1-F7, F7-T3, T3-T5, T5-O1, Fp2-F8, F8-T4, T4-T6, T6-O2,
                  Fp1-F3, F3-C3, C3-P3, P3-O1, Fp2-F4, F4-C4, C4-P4, P4-O2, Fz-Cz, Cz-Pz]  # all 18 (6th region)

# Homologous L/R pairs for asymmetry log-ratios (Left / Right): 2 region-level + 8 per-channel
# (matches recording.py ASYM_PAIRS).
homologous_pairs:
  temporal:     [L_temporal, R_temporal]
  parasagittal: [L_parasagittal, R_parasagittal]
  ch_pairs:     # per-channel L/R (Fp1-F7↔Fp2-F8, F7-T3↔F8-T4, T3-T5↔T4-T6, T5-O1↔T6-O2,
                #                   Fp1-F3↔Fp2-F4, F3-C3↔F4-C4, C3-P3↔C4-P4, P3-O1↔P4-O2)
    - [Fp1-F7, Fp2-F8]
    - [F7-T3, F8-T4]
    - [T3-T5, T4-T6]
    - [T5-O1, T6-O2]
    - [Fp1-F3, Fp2-F4]
    - [F3-C3, F4-C4]
    - [C3-P3, C4-P4]
    - [P3-O1, P4-O2]

# Optional finer anterior/posterior splits within a chain (for focal localization):
subregions:
  L_anterior_temporal:  [Fp1-F7, F7-T3]
  R_anterior_temporal:  [Fp2-F8, F8-T4]
  L_posterior_temporal: [T3-T5, T5-O1]
  R_posterior_temporal: [T4-T6, T6-O2]
  L_frontocentral:      [Fp1-F3, F3-C3]
  R_frontocentral:      [Fp2-F4, F4-C4]
  L_centroparietal:     [C3-P3, P3-O1]
  R_centroparietal:     [C4-P4, P4-O2]
